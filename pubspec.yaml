name: herzon
description: A real-time proximity-based social network for Algeria.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.2.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

  # Maps & Location
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Backend & Auth
  supabase_flutter: ^2.0.0

  # Media & Upload
  image_picker: ^1.0.0
  path_provider: ^2.1.0
  video_player: ^2.8.0
  chewie: ^1.7.0
  cached_network_image: ^3.3.0

  # Charts
  fl_chart: ^0.68.0
  
  # Storage
  shared_preferences: ^2.2.0

  # Push Notifications & Crash Reporting & App Check
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.0
  firebase_crashlytics: ^4.3.0
  firebase_app_check: ^0.3.2

  # Offline Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Contacts (alternative implementation using platform method channels)
  # contacts_service: ^0.6.3

  # Crash Reporting (requires newer Kotlin; keeping stub-only for now)
  # sentry_flutter: ^7.12.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  uuid: ^4.2.0
  intl: ^0.18.1

  # Env
  flutter_dotenv: ^5.1.0
  maplibre_gl: ^0.26.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

dependency_overrides:
  device_info_plus: 10.1.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
