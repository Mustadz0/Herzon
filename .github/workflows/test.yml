name: Test & Analyze
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
